services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: colobot-postgres
    environment:
      POSTGRES_USER: colobot
      POSTGRES_PASSWORD: colobot123
      POSTGRES_DB: colobot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colobot -d colobot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
