services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: colobot-postgres
    environment:
      POSTGRES_USER: colobot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-colobot_dev_password}
      POSTGRES_DB: colobot
    ports:
      - "5432:5432"
    volumes:
      - /tmp/colobot_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colobot -d colobot"]
      interval: 5s
      timeout: 5s
      retries: 5
