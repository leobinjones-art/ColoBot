version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "Condamnation"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
    ignore:
      # Ignore updates to typescript for breaking changes
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Ignore updates to vitest for breaking changes
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "Condamnation"
    labels:
      - "github-actions"
      - "dependencies"
    commit-message:
      prefix: "ci"