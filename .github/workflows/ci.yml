name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Type Check + Lint + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: colobot
          POSTGRES_USER: colobot
          POSTGRES_PASSWORD: colobot123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Initialize database
        run: npm run db:init
        env:
          DATABASE_URL: postgresql://colobot:colobot123@localhost:5432/colobot
          DATABASE_HOST: localhost

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Prettier check
        run: npx prettier --check .
        ignore-path: .gitignore

      - name: ESLint
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --run
